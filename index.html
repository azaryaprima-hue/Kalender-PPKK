<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
}

</style>

</head>

<body>

<h2>Kalender Jadwal</h2>

<div id="calendar"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDaamtGHASyn5mk2WmwNVkmEf0fYH4o-6k",
  authDomain: "kalender-ppkk.firebaseapp.com",
  projectId: "kalender-ppkk",
  storageBucket: "kalender-ppkk.firebasestorage.app",
  messagingSenderId: "171816159723",
  appId: "1:171816159723:web:ec79eced1d9ab85e2c31ae"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let events = []

document.addEventListener('DOMContentLoaded', function() {

var calendarEl = document.getElementById('calendar')

var calendar = new FullCalendar.Calendar(calendarEl, {

initialView: 'dayGridMonth',

selectable:true,

events:events,

select:function(info){

let nama = prompt("Nama")
let ket = prompt("Keterangan")

if(!nama) return

let event = {
title:nama + " - " + ket,
start:info.startStr,
end:info.endStr
}

db.collection("events").add(event).then(doc=>{

event.id = doc.id

calendar.addEvent({
id:doc.id,
title:event.title,
start:event.start,
end:event.end
})

})

},

eventClick:function(info){

let action = prompt("ketik HAPUS")

if(action=="HAPUS"){

db.collection("events").doc(info.event.id).delete()

info.event.remove()

}

}

})

calendar.render()

// LOAD DATA FIREBASE

db.collection("events").get().then(snapshot=>{

snapshot.forEach(doc=>{

let data = doc.data()

calendar.addEvent({
id:doc.id,
title:data.title,
start:data.start,
end:data.end
})

})

})

})

</script>

</body>
</html>
